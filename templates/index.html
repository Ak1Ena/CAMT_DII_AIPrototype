<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Chihuahua or Muffin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --paper:#f7f3ed;
  --paper2:#f0ead9;
  --ink:#2b2318;
  --ink2:#6b5c47;
  --ink3:#a89880;
  --line:#d8cfc0;
  --rust:#9b3e1f;
  --rust-l:#f0e4dd;
  --honey:#c4802a;
}

body{
  background:var(--paper);
  color:var(--ink);
  font-family:'DM Mono',monospace;
  font-weight:300;
  min-height:100vh;
  line-height:1.6;
}

.wrap{
  max-width:700px;
  margin:0 auto;
  padding:4rem 2rem 6rem;
}

.site-head{margin-bottom:4rem}
.site-head h1{
  font-family:'Lora',serif;
  font-weight:400;
  font-size:2rem;
  letter-spacing:-.02em;
  color:var(--ink);
}
.site-head h1 em{font-style:italic;color:var(--rust)}
.site-head p{font-size:.7rem;color:var(--ink3);letter-spacing:.06em;margin-top:.4rem}

.label{
  font-size:.62rem;
  letter-spacing:.18em;
  color:var(--ink3);
  text-transform:uppercase;
  margin-bottom:1rem;
  display:flex;
  align-items:center;
  gap:.75rem;
}
.label::after{content:'';flex:1;height:1px;background:var(--line)}

.upload-section{margin-bottom:2.5rem}
.drop-zone{
  position:relative;
  border:1px dashed var(--line);
  background:var(--paper2);
  min-height:220px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:1rem;cursor:pointer;
  transition:background .2s,border-color .2s;
  overflow:hidden;
}
.drop-zone:hover,.drop-zone.over{background:#ede6d6;border-color:var(--ink3)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-inner{display:flex;flex-direction:column;align-items:center;gap:.6rem;pointer-events:none}
.drop-glyph{font-size:2rem;line-height:1;opacity:.3}
.drop-inner h3{
  font-family:'Lora',serif;font-weight:400;font-size:.88rem;color:var(--ink2);
}
.drop-inner span{font-size:.62rem;color:var(--ink3)}
#preview{display:none;max-width:100%;max-height:260px;object-fit:contain}
#placeholder{display:flex;flex-direction:column;align-items:center;gap:.5rem}

.classify-btn{
  width:100%;
  border:1px solid var(--ink);
  background:transparent;color:var(--ink);
  font-family:'Lora',serif;
  font-size:1rem;font-weight:400;font-style:italic;
  padding:.85rem;cursor:pointer;letter-spacing:.03em;
  transition:background .2s,color .2s;
  margin-top:.75rem;
}
.classify-btn:hover:not(:disabled){background:var(--ink);color:var(--paper)}
.classify-btn:disabled{opacity:.3;cursor:not-allowed}

.spinner{
  display:none;width:20px;height:20px;
  border:1.5px solid var(--line);border-top-color:var(--ink2);
  border-radius:50%;animation:spin .8s linear infinite;margin:2rem auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

.err{
  display:none;font-size:.68rem;color:var(--rust);
  padding:.75rem 1rem;border:1px solid #e8c5b8;
  background:var(--rust-l);line-height:1.6;margin-top:1rem;
}

.result-section{margin-top:2.5rem}
.result-empty{text-align:center;padding:3rem 0;color:var(--ink3)}
.result-empty .big{
  font-family:'Lora',serif;font-size:5rem;font-style:italic;
  opacity:.15;display:block;line-height:1;margin-bottom:.75rem;
}
.result-empty p{font-size:.68rem;letter-spacing:.05em}

.result-card{display:none;animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.verdict-row{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.75rem}
.verdict-word{
  font-family:'Lora',serif;font-size:2.8rem;
  font-weight:400;letter-spacing:-.02em;line-height:1;
}
.verdict-word.chihuahua{color:var(--rust)}
.verdict-word.muffin{color:var(--honey)}
.verdict-pct{font-size:.72rem;color:var(--ink3)}

.bars{display:flex;flex-direction:column;gap:.9rem;margin-bottom:1.75rem}
.bar-meta{
  display:flex;justify-content:space-between;
  font-size:.62rem;color:var(--ink3);margin-bottom:.35rem;letter-spacing:.04em;
}
.bar-track{height:2px;background:var(--line);position:relative}
.bar-fill{
  height:100%;width:0;
  transition:width 1s cubic-bezier(.22,1,.36,1);
  position:absolute;top:0;left:0;
}
.bar-fill.chihuahua{background:var(--rust)}
.bar-fill.muffin{background:var(--honey)}

.reasoning{
  display:none;font-size:.7rem;color:var(--ink2);
  line-height:1.7;padding-top:1.25rem;
  border-top:1px solid var(--line);font-style:italic;
}
.reasoning::before{
  content:'model note — ';
  font-style:normal;color:var(--ink3);
  font-size:.62rem;letter-spacing:.08em;
  text-transform:uppercase;display:block;margin-bottom:.4rem;
}

.examples-section{margin-top:3.5rem}
.examples-grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:6px;margin-top:1rem;
}
.ex{cursor:pointer;position:relative;overflow:hidden}
.ex img{
  width:100%;aspect-ratio:1;object-fit:cover;display:block;
  filter:saturate(.6);transition:filter .2s,transform .2s;
}
.ex:hover img{filter:saturate(1);transform:scale(1.05)}
.ex-lbl{
  position:absolute;bottom:0;left:0;right:0;
  font-size:.52rem;letter-spacing:.1em;
  background:rgba(43,35,24,.55);
  color:rgba(247,243,237,.85);
  padding:.25rem .4rem;text-align:center;
}

.site-foot{
  margin-top:5rem;padding-top:1.5rem;
  border-top:1px solid var(--line);
  display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:.75rem;
}
.site-foot span{font-size:.6rem;color:var(--ink3);letter-spacing:.06em}
.model-pill{
  font-size:.58rem;letter-spacing:.08em;
  color:var(--ink2);border:1px solid var(--line);padding:.2rem .65rem;
}

@media(max-width:500px){
  .examples-grid{grid-template-columns:repeat(3,1fr)}
  .wrap{padding:2.5rem 1.25rem 4rem}
  .site-head h1{font-size:1.6rem}
}
</style>
</head>
<body>
<div class="wrap">

  <header class="site-head">
    <h1>Chihuahua or <em>Muffin?</em></h1>
    <p>svm · hog + color histogram &mdash; drop an image, the model decides</p>
  </header>

  <section class="upload-section">
    <div class="label">image</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp"/>
      <img id="preview" src="" alt="preview"/>
      <div id="placeholder" class="drop-inner">
        <div class="drop-glyph">&#8682;</div>
        <h3>drop an image, or click to browse</h3>
        <span>jpg &middot; png &middot; webp</span>
      </div>
    </div>
    <button class="classify-btn" id="classify-btn" disabled>Classify &rarr;</button>
    <div class="err" id="err-box"></div>
  </section>

  <section class="result-section">
    <div class="label">prediction</div>
    <div class="result-empty" id="empty-state">
      <span class="big">?</span>
      <p>waiting for an image</p>
    </div>
    <div class="spinner" id="spinner"></div>
    <div class="result-card" id="result-card">
      <div class="verdict-row">
        <span class="verdict-word" id="verdict-word"></span>
        <span class="verdict-pct" id="verdict-pct"></span>
      </div>
      <div class="bars" id="bars"></div>
      <div class="reasoning" id="reasoning"></div>
    </div>
  </section>

  <section class="examples-section">
    <div class="label">examples &mdash; click to try</div>
    <div class="examples-grid" id="example-grid"></div>
  </section>

  <footer class="site-foot">
    <span>chihuahuanet &middot; 2026</span>
    <span class="model-pill">SVM · HOG + color · ~92.6% cv accuracy</span>
  </footer>

</div>
<script>
// ── Example images ────────────────────────────────────────────────────────────
const EXAMPLES = [
  { label:'CHIHUAHUA', tag:'dog',
    src:'https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Cute_dog.jpg/320px-Cute_dog.jpg' },
  { label:'CHIHUAHUA', tag:'dog',
    src:'https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Dog_Breeds.jpg/320px-Dog_Breeds.jpg' },
  { label:'CHIHUAHUA', tag:'dog',
    src:'https://upload.wikimedia.org/wikipedia/commons/thumb/a/a9/Chihuahua_Dog.jpg/320px-Chihuahua_Dog.jpg' },
  { label:'MUFFIN', tag:'food',
    src:'https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Blueberry_muffin_in_a_white_cup.jpg/320px-Blueberry_muffin_in_a_white_cup.jpg' },
  { label:'MUFFIN', tag:'food',
    src:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/30/Fresh_made_muffins_in_a_muffin_tin.jpg/320px-Fresh_made_muffins_in_a_muffin_tin.jpg' },
];
const grid = document.getElementById('example-grid');
EXAMPLES.forEach(ex => {
  const card = document.createElement('div');
  card.className = 'ex';
  card.innerHTML = `
    <img src="${ex.src}" alt="${ex.label}"
         onerror="this.src='https://placehold.co/200x200/f0ead9/6b5c47?text=${encodeURIComponent(ex.label)}'"/>
    <div class="ex-lbl">${ex.label}</div>`;
  grid.appendChild(card);
});

// ── UI elements ───────────────────────────────────────────────────────────────
const fileInput   = document.getElementById('file-input');
const dropZone    = document.getElementById('drop-zone');
const preview     = document.getElementById('preview');
const placeholder = document.getElementById('placeholder');
const btn         = document.getElementById('classify-btn');
const emptyState  = document.getElementById('empty-state');
const spinner     = document.getElementById('spinner');
const errBox      = document.getElementById('err-box');
const resultCard  = document.getElementById('result-card');
const verdictWord = document.getElementById('verdict-word');
const verdictPct  = document.getElementById('verdict-pct');
const barsEl      = document.getElementById('bars');
const reasoningEl = document.getElementById('reasoning');

const ICONS = { Chihuahua:'🐕', Muffin:'🧁' };

let selectedFile = null;

function setPreview(file) {
  selectedFile = file;
  const url = URL.createObjectURL(file);
  preview.src = url;
  preview.style.display = 'block';
  placeholder.style.display = 'none';
  btn.disabled = false;
}

fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) setPreview(fileInput.files[0]);
});

// Drag & drop
['dragover','dragenter'].forEach(ev =>
  dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('over'); }));
['dragleave','dragend','drop'].forEach(ev =>
  dropZone.addEventListener(ev, () => dropZone.classList.remove('over')));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer?.files[0];
  if (f && f.type.startsWith('image/')) setPreview(f);
});

// ── State helpers ─────────────────────────────────────────────────────────────
function showLoading() {
  emptyState.style.display = 'none';
  resultCard.style.display = 'none';
  errBox.style.display     = 'none';
  spinner.style.display    = 'block';
  btn.disabled = true;
}
function showError(msg) {
  spinner.style.display = 'none';
  errBox.textContent    = '⚠ ' + msg;
  errBox.style.display  = 'block';
  btn.disabled = false;
}
function showResult(data) {
  spinner.style.display    = 'none';
  resultCard.style.display = 'block';
  btn.disabled = false;

  const cls = data.class; // "Chihuahua" or "Muffin"
  verdictWord.textContent = cls.toUpperCase();
  verdictWord.className   = 'verdict-word ' + cls.toLowerCase();
  verdictPct.textContent  = data.confidence + '% confidence';

  // Bars from all_proba
  barsEl.innerHTML = '';
  Object.entries(data.all_proba).forEach(([label, pct]) => {
    const row = document.createElement('div');
    row.innerHTML = `
      <div class="bar-meta"><span>${label}</span><span>${pct}%</span></div>
      <div class="bar-track">
        <div class="bar-fill ${label.toLowerCase()}" data-w="${pct}"></div>
      </div>`;
    barsEl.appendChild(row);
  });
  setTimeout(() => {
    barsEl.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 60);

  // Reasoning hidden in original script — keep reasoning el hidden
  reasoningEl.style.display = 'none';
}

// ── Classify via Flask /predict ───────────────────────────────────────────────
btn.addEventListener('click', async () => {
  if (!selectedFile) return;
  showLoading();
  const fd = new FormData();
  fd.append('image', selectedFile);
  try {
    const res  = await fetch('/predict', { method:'POST', body:fd });
    const data = await res.json();
    if (!res.ok || data.error) {
      showError(data.error || `Server error ${res.status}`);
    } else {
      showResult(data);
    }
  } catch (err) {
    showError('Network error — is the Flask server running? ' + err.message);
  }
});
</script>
</body>
</html>
